<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Director - Indonesian Amateur Shot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        pre { background-color: #1e293b; scrollbar-width: thin; scrollbar-color: #ef4444 #1e293b; }
        pre::-webkit-scrollbar { width: 8px; height: 8px; }
        pre::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        pre::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        select:disabled, input:disabled, button:disabled { opacity: 0.4; cursor: not-allowed; border-color: #475569; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div id="mainContent" class="w-full max-w-7xl transition-all duration-500">
        
        <div class="text-center mb-6 relative">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2"><i class="fa-solid fa-microchip text-blue-500 mr-2"></i> AI Prompt Director V1.0</h1>
            <p class="text-slate-400">Powered by Gemini API. Generasi prompt dinamis tanpa batas.</p>
            
            <div class="mt-4 flex justify-center items-center gap-2">
                <div class="relative w-full max-w-md">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-key text-slate-500"></i>
                    </div>
                    <input type="password" id="apiKeyInput" placeholder="Masukkan Gemini API Key Anda..." class="w-full bg-slate-800 text-slate-200 border border-slate-600 rounded-lg py-2 pl-10 pr-4 outline-none focus:border-blue-500 transition-colors">
                </div>
                <button onclick="saveApiKey()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg shadow transition-colors">
                    Simpan Key
                </button>
            </div>
            <p id="keyStatus" class="text-xs text-green-400 mt-2 hidden"><i class="fa-solid fa-check-circle"></i> API Key tersimpan di browser.</p>
        </div>

        <div class="flex flex-col gap-6 mb-8 w-full">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm">
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold text-xs">Jumlah Orang</label>
                    <select id="numSelect" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-blue-500 cursor-pointer">
                        <option value="Acak">🎲 Acak (1-6)</option>
                        <option value="1 Orang (Solo)">1 Orang (Solo)</option>
                        <option value="2 Orang (Duo)">2 Orang (Duo)</option>
                        <option value="Sekelompok teman (3-4 orang)">Grup Kecil (3-4)</option>
                        <option value="Rombongan besar (5+ orang)">Grup Besar (5+)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold text-xs">Rentang Usia</label>
                    <select id="ageSelect" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-blue-500 cursor-pointer">
                        <option value="Acak">🎲 Acak Usia</option>
                        <option value="Remaja (13-19 tahun)">Remaja (13-19)</option>
                        <option value="Dewasa Muda Gen-Z/Millennial (20-29 tahun)">Dewasa Muda (20-29)</option>
                        <option value="Dewasa (30-40 tahun)">Dewasa (30-40)</option>
                        <option value="Paruh Baya (40+ tahun)">Paruh Baya (40+)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold text-xs">Era / Zaman</label>
                    <select id="eraSelect" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-blue-500 cursor-pointer font-bold">
                        <option value="Modern Gen-Z (2020-an)">2020s (Modern / Gen-Z)</option>
                        <option value="Era Hipster Indie (2010-an)">2010s (Hipster/Indie)</option>
                        <option value="Era Y2K Warnet/Nokia (2000-an)">2000s (Y2K/Warnet)</option>
                        <option value="Era Grunge/Retro Analog (1990-an)">1990s (Grunge/Retro)</option>
                        <option value="Timeless Basic / Kasual Umum">Timeless / Basic Kasual</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold text-xs">Lokasi Generik</label>
                    <select id="locSelect" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-blue-500 cursor-pointer">
                        <option value="Bebas, serahkan pada AI">🎲 Acak Otomatis</option>
                        <option value="Kamar Tidur Berantakan / Kos-kosan">Kamar / Kos-kosan</option>
                        <option value="Jalanan Kota / Trotoar / Zebra Cross">Jalanan Kota</option>
                        <option value="Di Atas Panggung Konser">Panggung Konser</option>
                        <option value="Backstage Konser / Ruang Tunggu Alat">Backstage Konser</option>
                        <option value="Kamar Mandi / Restroom Kaca Besar">Toilet Kaca (Mirror Selfie)</option>
                        <option value="Warteg / Tempat Makan Pinggir Jalan">Warteg / Street Food</option>
                        <option value="Dalam Mobil (Jok Depan/Belakang)">Dalam Mobil</option>
                        <option value="Minimarket / Lorong Supermarket">Minimarket</option>
                        <option value="Pantai / Pinggir Laut">Pantai / Alam</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm">
                <div>
                    <label class="block text-orange-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-video"></i> Gaya Kamera</label>
                    <select id="cameraSelect" class="w-full bg-slate-900 text-orange-200 border border-orange-700 rounded p-2 outline-none focus:border-orange-500 cursor-pointer">
                        <option value="Gaya jepretan acak yang natural">🎲 Acak Kamera</option>
                        <option value="Selfie standar depan wajah">Selfie Standar</option>
                        <option value="Selfie 0.5x Ultra Wide dari atas kepala (Top-down foreshortening)">0.5x Top-Down Selfie</option>
                        <option value="Mirror Selfie (Foto pantulan di kaca)">Mirror Selfie</option>
                        <option value="Candid tidak sadar kamera, natural">Candid Unaware</option>
                        <option value="Candid pura-pura (sadar kamera tapi aesthetic buang muka)">Candid Aesthetic</option>
                        <option value="Foto dari sudut pandang kamera keamanan CCTV">Kamera CCTV</option>
                        <option value="Foto blur tidak sengaja terjepret, shaky">Accidental Blur Shot</option>
                    </select>
                </div>
                <div>
                    <label class="block text-cyan-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-crop-simple"></i> Komposisi</label>
                    <select id="compSelect" class="w-full bg-slate-900 text-cyan-200 border border-cyan-700 rounded p-2 outline-none focus:border-cyan-500 cursor-pointer">
                        <option value="Komposisi amatir natural, framing tidak direncanakan">❌ Amatir (Default)</option>
                        <option value="Bebas, pilih yang paling cocok">🎲 Acak (Otomatis)</option>
                        <option value="Golden Ratio (Fibonacci Spiral)">Golden Ratio</option>
                        <option value="Rule of Thirds">Rule of Thirds</option>
                        <option value="Simetris berada di tengah">Symmetry and Balance</option>
                        <option value="Fill the frame (Wajah/Subjek memenuhi layar)">Fill the Frame</option>
                        <option value="Negative Space (Banyak ruang kosong)">Negative Space</option>
                    </select>
                </div>
                <div>
                    <label class="block text-purple-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-wand-magic-sparkles"></i> Filter / Vibe</label>
                    <select id="aestheticSelect" class="w-full bg-slate-900 text-purple-200 border border-purple-700 rounded p-2 outline-none focus:border-purple-500 cursor-pointer">
                        <option value="Default kamera HP, tanpa editan berlebih">📷 Default (Bawaan)</option>
                        <option value="Flash paparazzi keras, kontras tinggi">Harsh Flash Paparazzi</option>
                        <option value="Filter analog film 35mm, bertekstur, light leaks">Analog Film 35mm</option>
                        <option value="Kualitas HP jadul, agak pixelated, low light buruk">HP Jadul Bersemut</option>
                        <option value="Soft portrait, natural, warna warm">Soft Warm Portrait</option>
                    </select>
                </div>
                <div>
                    <label class="block text-yellow-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-star"></i> Waktu & Cuaca</label>
                    <select id="weatherSelect" class="w-full bg-slate-900 text-yellow-200 border border-yellow-600 rounded p-2 outline-none focus:border-yellow-400 cursor-pointer">
                        <option value="Acak waktu dan cuaca">🎲 Acak</option>
                        <option value="Siang hari cerah terik">Siang Terik</option>
                        <option value="Sore hari (Golden Hour)">Sore (Golden Hour)</option>
                        <option value="Malam hari dengan cahaya neon/jalanan">Malam Hari</option>
                        <option value="Cuaca mendung (Gloomy)">Mendung / Overcast</option>
                        <option value="Sedang hujan, basah">Hujan / Wet</option>
                    </select>
                </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm w-full">
                <label class="block text-green-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-clapperboard"></i> Skenario / Arahan Spesifik (Opsional)</label>
                <input type="text" id="customScenarioInput" placeholder="Cth: Mereka sedang makan indomie sambil tertawa lepas, salah satunya pakai helm..." class="w-full bg-slate-900 text-green-300 border border-green-700 rounded p-3 outline-none focus:border-green-500 transition-colors placeholder-slate-500">
            </div>
        </div>

        <div class="flex justify-center mb-8 w-full">
            <button onclick="generateAI()" id="generateBtn" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white text-lg font-bold rounded-xl shadow-lg hover:shadow-blue-500/50 transition-all flex items-center justify-center gap-3 transform hover:scale-105 duration-300 w-full md:w-auto min-w-[300px]">
                <i class="fa-solid fa-robot text-2xl"></i> MINTA AI BUATKAN PROMPT
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full">
            
            <div class="relative bg-slate-800 rounded-xl border border-slate-700 shadow-xl flex flex-col">
                <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700 rounded-t-xl">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-image text-blue-400"></i>
                        <span class="text-sm text-slate-300 font-bold tracking-wider">PROMPT FOTO (JSON)</span>
                    </div>
                    <button onclick="copyToClipboard('photo')" id="copyBtnPhoto" class="text-xs px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded transition-all">
                        <i class="fa-regular fa-copy"></i> Salin
                    </button>
                </div>
                <pre id="jsonOutputPhoto" class="p-4 flex-1 text-sm font-mono text-blue-300 max-h-[600px] overflow-y-auto whitespace-pre-wrap">// Menunggu AI...</pre>
            </div>

            <div class="relative bg-slate-800 rounded-xl border border-slate-700 shadow-xl flex flex-col">
                <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700 rounded-t-xl">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-video text-purple-400"></i>
                        <span class="text-sm text-slate-300 font-bold tracking-wider">PROMPT VIDEO (JSON)</span>
                    </div>
                    <button onclick="copyToClipboard('video')" id="copyBtnVideo" class="text-xs px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded transition-all">
                        <i class="fa-regular fa-copy"></i> Salin
                    </button>
                </div>
                <pre id="jsonOutputVideo" class="p-4 flex-1 text-sm font-mono text-purple-300 max-h-[600px] overflow-y-auto whitespace-pre-wrap">// Menunggu AI...</pre>
            </div>

        </div>
    </div>

    <script>
        // Inisialisasi API Key dari LocalStorage saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('geminiApiKey');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
                document.getElementById('keyStatus').classList.remove('hidden');
            }
        });

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key) {
                localStorage.setItem('geminiApiKey', key);
                document.getElementById('keyStatus').classList.remove('hidden');
                alert("API Key berhasil disimpan di browser Anda!");
            } else {
                alert("Masukkan API Key yang valid.");
            }
        }

        async function generateAI() {
            const apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) {
                alert("Harap masukkan dan simpan Gemini API Key Anda terlebih dahulu di bagian atas.");
                return;
            }

            const btn = document.getElementById('generateBtn');
            const originalBtnHtml = btn.innerHTML;
            
            // Set UI ke mode Loading
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-2xl"></i> SEDANG MEMUTAR OTAK...';
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            document.getElementById('jsonOutputPhoto').textContent = "// Meminta ke Gemini API...\n// Harap tunggu beberapa detik.";
            document.getElementById('jsonOutputVideo').textContent = "// Meminta ke Gemini API...\n// Harap tunggu beberapa detik.";

            // Ambil Input UI
            const num = document.getElementById('numSelect').value;
            const age = document.getElementById('ageSelect').value;
            const era = document.getElementById('eraSelect').value;
            const loc = document.getElementById('locSelect').value;
            const camera = document.getElementById('cameraSelect').value;
            const comp = document.getElementById('compSelect').value;
            const vibe = document.getElementById('aestheticSelect').value;
            const weather = document.getElementById('weatherSelect').value;
            const custom = document.getElementById('customScenarioInput').value;

            // Merakit Instruksi (Meta-Prompt)
            const metaPrompt = `Kamu adalah AI ahli pembuat prompt gambar photorealistic (text-to-image) dan prompt video.
Tugasmu adalah membuat spesifikasi fotografi amatir bergaya *smartphone* di Indonesia.

Berikut adalah kriteria UTAMA yang harus kamu ikuti:
- Era/Zaman: ${era}
- Lokasi: ${loc}
- Jumlah Orang: ${num}
- Rentang Usia: ${age}
- Gaya Kamera: ${camera}
- Komposisi Frame: ${comp}
- Filter/Vibe: ${vibe}
- Waktu & Cuaca: ${weather}
- Skenario Khusus: ${custom ? custom : "Pikirkan interaksi atau pose acak yang sangat natural, tidak kaku, dan relate dengan kebiasaan orang Indonesia di era tersebut."}

BERDASARKAN KRITERIA DI ATAS, hasilkan detail pakaian (outfit) yang spesifik dan akurat sesuai era, pose yang dinamis, pencahayaan, dan detail background. 

KEMBALIKAN HANYA FORMAT JSON VALID DENGAN STRUKTUR BERIKUT (TANPA MARKDOWN, TANPA TEKS LAIN):
{
  "PHOTO_PROMPT": {
    "META": { "STYLERNAME": "Nama style deskriptif", "ASPECTRATIO": "Pilih 9:16 atau 3:4 atau 1:1" },
    "CAMERA": { "MODEL": "...", "FOCALLNGTH": "...", "ANGLE": "...", "COMPOSITION_RULE": "...", "TYPE": "AMATEUR SNAPSHOT" },
    "SUBJECT": { "PRIMARY": "Deskripsi fisik dan demografi", "GROUP_DYNAMICS_POSE": "Jelaskan pose dan interaksi secara detail dalam bahasa Inggris", "GAZE": "Arah mata" },
    "WARDROBE": { "THEME": "...", "OUTFITS": "Deskripsi pakaian spesifik per orang", "ACCESSORIES": "...", "APPEARANCE": "..." },
    "ENVIRONMENT": { "LOCATION": "...", "TIME_OF_DAY": "...", "WEATHER_CONDITION": "...", "DETAILS": "Detail background spesifik", "COMPOSITION_VIBE": "..." },
    "LIGHTING": { "SOURCE": "...", "DIRECTION": "...", "QUALITY": "..." },
    "RENDERING_EFFECTS": { "ENGINE": "PHOTOREALISTIC RAW UPLOAD, LOCAL INDONESIAN VIBE", "AESTHETIC_FLAWS": "...", "POSTPROCESSING": "UNEDITED CAMERA ROLL LOOK" },
    "NEGATIVE_PROMPT": "Sebutkan hal yang tidak boleh muncul, misal: studio lighting, professional, CGI, dll."
  },
  "VIDEO_PROMPT": {
    "WORKFLOW_INSTRUCTION": "USE THE IMAGE GENERATED FROM 'PHOTO_PROMPT' AS THE STARTING FRAME",
    "TARGET_DURATION": "5 SECONDS",
    "CAMERA_MOVEMENT": "Contoh: SHAKY HANDHELD RECORDING",
    "SCENE_DYNAMICS": "Deskripsi gerakan subjek",
    "FPS_STYLE": "Contoh: 30FPS CHOPPY DIGITAL VIDEO",
    "TEXT_PROMPT_FOR_AI_VIDEO": "Gabungan prompt video dalam bahasa Inggris"
  }
}`;

            try {
                // Memanggil Google Gemini API (Model: 1.5-flash untuk respon cepat & pintar)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: metaPrompt }] }],
                        generationConfig: { response_mime_type: "application/json" } // Memaksa Output JSON
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "Gagal menghubungi Gemini API");
                }

                const data = await response.json();
                const jsonString = data.candidates[0].content.parts[0].text;
                
                // Parse respon AI
                const parsedJSON = JSON.parse(jsonString);

                // Menampilkan ke UI
                document.getElementById('jsonOutputPhoto').textContent = JSON.stringify(parsedJSON.PHOTO_PROMPT, null, 2);
                document.getElementById('jsonOutputVideo').textContent = JSON.stringify(parsedJSON.VIDEO_PROMPT, null, 2);

            } catch (error) {
                console.error(error);
                document.getElementById('jsonOutputPhoto').textContent = "// ERROR: \n" + error.message;
                document.getElementById('jsonOutputVideo').textContent = "// Gagal mendapatkan respon.";
            } finally {
                // Kembalikan tombol ke kondisi semula
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function copyToClipboard(type) {
            const contentId = type === 'photo' ? 'jsonOutputPhoto' : 'jsonOutputVideo';
            const btnId = type === 'photo' ? 'copyBtnPhoto' : 'copyBtnVideo';
            
            const contentEl = document.getElementById(contentId);
            if (!contentEl) return;
            const content = contentEl.textContent;
            
            if(content.includes('Menunggu AI...')) return;

            const textArea = document.createElement("textarea");
            textArea.value = content;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const copyBtn = document.getElementById(btnId);
            copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
            copyBtn.classList.remove('bg-slate-700', 'hover:bg-slate-600');
            copyBtn.classList.add('bg-green-600', 'hover:bg-green-500');
            
            setTimeout(() => {
                copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
                copyBtn.classList.remove('bg-green-600', 'hover:bg-green-500');
                copyBtn.classList.add('bg-slate-700', 'hover:bg-slate-600');
            }, 2000);
        }
    </script>
</body>
</html>
