<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Director - V2 Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        pre { background-color: #1e293b; scrollbar-width: thin; scrollbar-color: #ef4444 #1e293b; }
        pre::-webkit-scrollbar { width: 8px; height: 8px; }
        pre::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        pre::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        select:disabled, input:disabled, button:disabled { opacity: 0.4; cursor: not-allowed; border-color: #475569; }
        .listbox-scroll::-webkit-scrollbar { width: 6px; }
        .listbox-scroll::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .listbox-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
        .listbox-scroll::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div id="mainContent" class="w-full max-w-7xl transition-all duration-500">
        
        <div class="text-center mb-6 relative">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2"><i class="fa-solid fa-microchip text-blue-500 mr-2"></i> AI Prompt Director V2.0</h1>
            <p class="text-slate-400">Hybrid System: Manual Camera Control + Gemini AI Brain.</p>
            
            <div class="mt-4 flex justify-center items-center gap-2">
                <div class="relative w-full max-w-md">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-key text-slate-500"></i>
                    </div>
                    <input type="password" id="apiKeyInput" placeholder="Masukkan Gemini API Key Anda..." class="w-full bg-slate-800 text-slate-200 border border-slate-600 rounded-lg py-2 pl-10 pr-4 outline-none focus:border-blue-500 transition-colors">
                </div>
                <button onclick="saveApiKey()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg shadow transition-colors">
                    Simpan Key
                </button>
            </div>
            <p id="keyStatus" class="text-xs text-green-400 mt-2 hidden"><i class="fa-solid fa-check-circle"></i> API Key tersimpan di browser.</p>
        </div>

        <div class="flex flex-col gap-6 mb-8 w-full">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm">
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold text-xs">Jumlah Orang</label>
                    <select id="numSelect" onchange="checkAdvancedToggle()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-blue-500 cursor-pointer">
                        <option value="Acak">🎲 Acak (1-6)</option>
                        <option value="1">1 Orang (Solo)</option>
                        <option value="2">2 Orang (Duo)</option>
                        <option value="3">3 Orang (Grup Kecil)</option>
                        <option value="5">Grup Besar (5+)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold text-xs">Rentang Usia</label>
                    <select id="ageSelect" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-blue-500 cursor-pointer">
                        <option value="Acak">🎲 Acak Usia</option>
                        <option value="Remaja (13-19 tahun)">Remaja (13-19)</option>
                        <option value="Dewasa Muda (20-29 tahun)">Dewasa Muda (20-29)</option>
                        <option value="Dewasa (30-40 tahun)">Dewasa (30-40)</option>
                        <option value="Paruh Baya (40+ tahun)">Paruh Baya (40+)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold text-xs">Gender</label>
                    <select id="genderSelect" onchange="checkAdvancedToggle()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-blue-500 cursor-pointer">
                        <option value="Campur/Acak">🎲 Acak / Campur</option>
                        <option value="Pria Semua">Semua Pria</option>
                        <option value="Wanita Semua">Semua Wanita</option>
                        <option value="Couple (Pria & Wanita)">Couple (Pria & Wanita)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-yellow-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-star"></i> Tipe Badan</label>
                    <select id="bodyTypeSelect" class="w-full bg-slate-900 text-yellow-200 border border-yellow-600 rounded p-2 outline-none focus:border-yellow-400 cursor-pointer">
                        <option value="Bebas Proporsional">🎲 Acak Proporsional</option>
                        <option value="Slim / Kurus Tinggi">Slim / Kurus Tinggi</option>
                        <option value="Berisi / Curvy">Berisi / Curvy</option>
                        <option value="Berotot / Atletis">Berotot / Atletis</option>
                        <option value="Gemuk / Chubby">Gemuk / Chubby</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm">
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="block text-blue-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-clock-rotate-left"></i> Era / Zaman</label>
                        <select id="eraSelect" class="w-full bg-slate-900 text-blue-200 border border-blue-600 rounded p-2 outline-none focus:border-blue-400 cursor-pointer font-bold">
                            <option value="Modern Gen-Z (2020-an)">2020s (Modern / Gen-Z)</option>
                            <option value="Era Hipster Indie (2010-an)">2010s (Hipster/Indie)</option>
                            <option value="Era Y2K Warnet/Nokia (2000-an)">2000s (Y2K/Warnet)</option>
                            <option value="Era Grunge/Retro Analog (1990-an)">1990s (Grunge/Retro)</option>
                            <option value="Timeless Basic / Kasual Umum">Timeless / Basic Kasual</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-map-location-dot"></i> Lokasi Generik (AI akan melengkapi)</label>
                        <select id="locSelect" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-blue-500 cursor-pointer">
                            <option value="Bebas, biarkan AI menyesuaikan dengan Era">🎲 Acak Otomatis</option>
                            <option value="Kamar Tidur Berantakan / Kos-kosan">Kamar / Kos-kosan</option>
                            <option value="Jalanan Kota / Trotoar / Zebra Cross">Jalanan Kota / Aspal</option>
                            <option value="Di Atas Panggung Konser">Panggung Konser</option>
                            <option value="Backstage Konser / Ruang Tunggu Alat">Backstage Konser</option>
                            <option value="Kamar Mandi / Restroom Kaca Besar">Toilet Kaca (Mirror Selfie)</option>
                            <option value="Warteg / Tempat Makan Pinggir Jalan">Warteg / Street Food</option>
                            <option value="Dalam Mobil (Jok Depan/Belakang)">Dalam Mobil</option>
                            <option value="Minimarket / Lorong Supermarket">Minimarket / Indomaret</option>
                            <option value="Pantai / Pinggir Laut">Pantai / Alam Terbuka</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col h-[300px]">
                    <label class="block text-orange-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-video"></i> Gaya Kamera & Angle (Manual)</label>
                    <input type="hidden" id="cameraSelect" value="RANDOM">
                    <div id="cameraListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900 border border-orange-600/50 rounded-lg p-2 flex flex-col gap-1.5 transition-all">
                        </div>
                </div>

                <div class="flex flex-col gap-4">
                    <div>
                        <label class="block text-purple-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-wand-magic-sparkles"></i> Filter / Aesthetic</label>
                        <select id="aestheticSelect" class="w-full bg-slate-900 text-purple-200 border border-purple-700 rounded p-2 outline-none focus:border-purple-500 cursor-pointer">
                            <option value="Default kamera HP, tanpa editan berlebih">📷 Default (Bawaan HP)</option>
                            <option value="Flash paparazzi keras, kontras tinggi">Harsh Flash Paparazzi</option>
                            <option value="Filter analog film 35mm, bertekstur, light leaks">Analog Film 35mm</option>
                            <option value="Kualitas HP jadul, agak pixelated, noise">HP Jadul Bersemut</option>
                            <option value="Soft portrait, natural, warna warm">Soft Warm Portrait</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-cyan-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-crop-simple"></i> Komposisi Frame</label>
                        <select id="compSelect" class="w-full bg-slate-900 text-cyan-200 border border-cyan-700 rounded p-2 outline-none focus:border-cyan-500 cursor-pointer">
                            <option value="Komposisi amatir natural, framing tidak direncanakan">❌ Amatir (Default)</option>
                            <option value="Golden Ratio (Fibonacci Spiral)">Golden Ratio</option>
                            <option value="Rule of Thirds">Rule of Thirds</option>
                            <option value="Simetris berada di tengah">Symmetry and Balance</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-yellow-400 mb-1 font-semibold text-xs">Waktu</label>
                            <select id="timeSelect" class="w-full bg-slate-900 text-yellow-200 border border-yellow-600 rounded p-2 outline-none text-xs cursor-pointer">
                                <option value="Acak">🎲 Acak</option>
                                <option value="Siang Hari">Siang</option>
                                <option value="Sore (Golden Hour)">Sore</option>
                                <option value="Malam Hari">Malam</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-1 font-semibold text-xs">Cuaca</label>
                            <select id="weatherSelect" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none text-xs cursor-pointer">
                                <option value="Acak">🎲 Acak</option>
                                <option value="Cerah">Cerah</option>
                                <option value="Mendung">Mendung</option>
                                <option value="Hujan">Hujan</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg text-sm items-end">
                
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold text-xs">AI Face Rules</label>
                    <select id="strictSelect" onchange="toggleStrictLevel()" class="w-full bg-slate-900 text-slate-200 border border-slate-600 rounded p-2 outline-none focus:border-red-500 cursor-pointer">
                        <option value="FLEXIBLE">🎨 Bebas (Flexible)</option>
                        <option value="STRICT">🔒 Ketat Wajah (Strict)</option>
                    </select>
                </div>
                
                <div id="strictLevelContainer" class="hidden">
                    <label class="block text-red-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-weight-hanging"></i> Bobot Strict Wajah</label>
                    <input type="number" id="strictWeight" min="0.1" max="1.0" step="0.1" value="1.0" class="w-full bg-slate-900 text-slate-200 border border-red-600 rounded p-2 outline-none focus:border-red-500 transition-colors">
                </div>

                <div id="holidayContainer">
                    <label class="block text-yellow-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-star"></i> Hari Raya (Opsional)</label>
                    <select id="holidaySelect" class="w-full bg-slate-900 text-yellow-200 border border-yellow-600 rounded p-2 outline-none focus:border-yellow-400 cursor-pointer">
                        <option value="Tidak ada">❌ Tidak Ada</option>
                        <option value="Idul Fitri (Lebaran)">Idul Fitri (Lebaran)</option>
                        <option value="Natal (Christmas)">Natal</option>
                        <option value="Imlek (Lunar New Year)">Imlek</option>
                        <option value="Galungan (Bali)">Galungan</option>
                    </select>
                </div>

                <div class="col-span-1 sm:col-span-2">
                    <label class="block text-green-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-user-tag"></i> Nama Karakter/Artis (Opsional)</label>
                    <input type="text" id="customNameGlobal" placeholder="Cth: Reza Rahadian" class="w-full bg-slate-900 text-green-300 border border-green-700 rounded p-2 outline-none focus:border-green-500 placeholder-slate-500">
                </div>

                <div class="col-span-1 sm:col-span-4 lg:col-span-4">
                    <label class="block text-green-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-clapperboard"></i> Skenario / Kegiatan Khusus (Opsional)</label>
                    <input type="text" id="customScenarioInput" placeholder="Cth: Duduk bersandar main HP sambil tertawa..." class="w-full bg-slate-900 text-green-300 border border-green-700 rounded p-2 outline-none focus:border-green-500 transition-colors placeholder-slate-500">
                </div>
            </div>
        </div>

        <div class="w-full max-w-7xl mx-auto mb-2 flex justify-between px-4">
            <label class="cursor-pointer flex items-center gap-2 text-slate-300 text-sm font-bold bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 hover:bg-slate-700 transition-colors shadow-lg">
                <input type="checkbox" id="advancedToggle" onchange="toggleAdvanced()" class="w-4 h-4 accent-blue-500 rounded cursor-pointer">
                <i class="fa-solid fa-sliders"></i> Atur Spesifik Tiap Orang (Advanced)
            </label>
        </div>

        <div id="advancedPanel" class="hidden w-full max-w-7xl mx-auto bg-slate-800/80 p-5 rounded-xl border border-blue-900/50 shadow-inner text-sm mb-8">
            <h3 class="text-blue-400 font-bold border-b border-blue-900/50 pb-2 mb-4"><i class="fa-solid fa-users-viewfinder"></i> Kustomisasi Karakter Spesifik</h3>
            <div id="characterRows" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
                </div>
        </div>

        <div class="flex justify-center mb-8 w-full">
            <button onclick="generateAI()" id="generateBtn" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white text-lg font-bold rounded-xl shadow-lg hover:shadow-blue-500/50 transition-all flex items-center justify-center gap-3 transform hover:scale-105 duration-300 w-full md:w-auto min-w-[300px]">
                <i class="fa-solid fa-robot text-2xl"></i> MINTA AI BUATKAN PROMPT
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full">
            <div class="relative bg-slate-800 rounded-xl border border-slate-700 shadow-xl flex flex-col">
                <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700 rounded-t-xl">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-image text-blue-400"></i>
                        <span class="text-sm text-slate-300 font-bold tracking-wider">PROMPT FOTO (JSON)</span>
                    </div>
                    <button onclick="copyToClipboard('photo')" id="copyBtnPhoto" class="text-xs px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded transition-all">
                        <i class="fa-regular fa-copy"></i> Salin
                    </button>
                </div>
                <pre id="jsonOutputPhoto" class="p-4 flex-1 text-sm font-mono text-blue-300 max-h-[600px] overflow-y-auto whitespace-pre-wrap word-break">// Menunggu AI...</pre>
            </div>

            <div class="relative bg-slate-800 rounded-xl border border-slate-700 shadow-xl flex flex-col">
                <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700 rounded-t-xl">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-video text-purple-400"></i>
                        <span class="text-sm text-slate-300 font-bold tracking-wider">PROMPT VIDEO (JSON)</span>
                    </div>
                    <button onclick="copyToClipboard('video')" id="copyBtnVideo" class="text-xs px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded transition-all">
                        <i class="fa-regular fa-copy"></i> Salin
                    </button>
                </div>
                <pre id="jsonOutputVideo" class="p-4 flex-1 text-sm font-mono text-purple-300 max-h-[600px] overflow-y-auto whitespace-pre-wrap word-break">// Menunggu AI...</pre>
            </div>
        </div>
    </div>

    <script>
        // --- RESTORED RADIO OPTION LOGIC FOR CAMERA LIST ---
        function createRadioOption(name, value, labelText, selectedValue, subText = "") {
            const isSelected = value === selectedValue ? "checked" : "";
            let subHtml = subText ? `<div class="text-[10px] text-slate-400 leading-tight mt-1 line-clamp-2">${subText}</div>` : "";
            const bgClass = isSelected ? 'bg-slate-700 border-slate-500 shadow-inner' : 'border-transparent hover:border-slate-600 hover:bg-slate-700/50';
            
            return `
            <label class="flex items-start gap-3 p-3 rounded-lg cursor-pointer transition-all border w-full radio-label ${bgClass}">
                <input type="radio" name="${name}" value="${value}" ${isSelected} class="mt-0.5 accent-blue-500 w-4 h-4 shrink-0 cursor-pointer radio-input">
                <div class="flex flex-col flex-1 pointer-events-none">
                    <span class="text-sm text-slate-200 font-semibold leading-tight">${labelText}</span>
                    ${subHtml}
                </div>
            </label>
            `;
        }

        function setupDelegation(containerId, inputId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.addEventListener('change', function(e) {
                if (e.target && e.target.classList.contains('radio-input')) {
                    document.getElementById(inputId).value = e.target.value;
                    container.querySelectorAll('.radio-label').forEach(lbl => {
                        lbl.classList.remove('bg-slate-700', 'border-slate-500', 'shadow-inner');
                        lbl.classList.add('border-transparent', 'hover:border-slate-600', 'hover:bg-slate-700/50');
                    });
                    const parentLabel = e.target.closest('.radio-label');
                    if (parentLabel) {
                        parentLabel.classList.add('bg-slate-700', 'border-slate-500', 'shadow-inner');
                        parentLabel.classList.remove('border-transparent', 'hover:border-slate-600', 'hover:bg-slate-700/50');
                    }
                }
            });
        }

        function renderCameraList() {
            const container = document.getElementById('cameraListContainer');
            const val = document.getElementById('cameraSelect').value;
            let html = createRadioOption('camRadio', 'RANDOM', '🎲 Acak Gaya Kamera', val, "AI menyesuaikan dengan skenario");

            html += `<div class="text-xs font-bold text-cyan-400 mt-3 mb-1 px-2 border-b border-slate-700 pb-1">🖼️ Image Reference</div>`;
            html += createRadioOption('camRadio', 'MATCH_POSE', '🧍‍♂️ Jiplak Pose & Angle Gambar', val, "Memaksa AI meniru pose & angle dari referensi");

            html += `<div class="text-xs font-bold text-orange-400 mt-3 mb-1 px-2 border-b border-slate-700 pb-1">🤳 Selfie & POV</div>`;
            const selfies = [
                {v: "Selfie Standar (Eye Level)", l: "Selfie Standar", s: "Sejajar wajah"},
                {v: "Selfie 0.5x Ultra Wide dari atas (Top-Down Foreshortening)", l: "0.5x Top-Down POV (Gen-Z)", s: "Kamera di atas kepala menatap kaki"},
                {v: "Selfie High Angle", l: "Selfie High Angle", s: "Dari atas (Estetik)"},
                {v: "Selfie Low Angle", l: "Selfie Low Angle", s: "Dari bawah dagu"},
                {v: "Selfie Close-Up ekstrem ke wajah", l: "Selfie Close-Up", s: "Sangat dekat ke wajah"},
                {v: "First-Person POV", l: "First-Person POV", s: "Sudut pandang mata subjek"}
            ];
            selfies.forEach(a => { html += createRadioOption('camRadio', a.v, a.l, val, a.s); });

            html += `<div class="text-xs font-bold text-orange-400 mt-3 mb-1 px-2 border-b border-slate-700 pb-1">🪞 Mirror Selfie</div>`;
            const mirrors = [
                {v: "Mirror Selfie Standar", l: "Mirror Selfie", s: "Foto lurus di depan cermin"},
                {v: "Faceless Mirror Selfie", l: "Faceless Mirror", s: "HP menutupi wajah"}
            ];
            mirrors.forEach(a => { html += createRadioOption('camRadio', a.v, a.l, val, a.s); });

            html += `<div class="text-xs font-bold text-orange-400 mt-3 mb-1 px-2 border-b border-slate-700 pb-1">📐 Ukuran Shot (Framing)</div>`;
            const framings = [
                {v: "Portrait Close-Up (Bahu ke atas)", l: "Portrait Close-Up", s: "Fokus wajah"},
                {v: "Medium Shot (Pinggang ke atas)", l: "Medium Shot (MS)", s: "Setengah badan"},
                {v: "Long Shot (Full Body)", l: "Long Shot (LS)", s: "Seluruh tubuh terlihat"}
            ];
            framings.forEach(a => { html += createRadioOption('camRadio', a.v, a.l, val, a.s); });

            html += `<div class="text-xs font-bold text-orange-400 mt-3 mb-1 px-2 border-b border-slate-700 pb-1">🎯 Sudut Angle Kamera (Posed)</div>`;
            const angles = [
                {v: "Eye Level Shot", l: "Eye Level", s: "Sejajar mata"},
                {v: "High Angle Shot", l: "High Angle", s: "Dari atas melihat ke bawah"},
                {v: "Low Angle Shot", l: "Low Angle", s: "Dari bawah melihat ke atas"},
                {v: "Bird's Eye View (Top-Down 90 derajat)", l: "Bird's Eye View", s: "Tegak lurus dari atas"},
                {v: "Frog Eye View (Kamera menyentuh tanah)", l: "Frog/Worm's Eye", s: "Sangat rendah menyentuh lantai"},
                {v: "Dutch Angle / Canted (Miring)", l: "Dutch Angle / Canted", s: "Kamera dimiringkan"}
            ];
            angles.forEach(a => { html += createRadioOption('camRadio', a.v, a.l, val, a.s); });

            html += `<div class="text-xs font-bold text-orange-400 mt-3 mb-1 px-2 border-b border-slate-700 pb-1">🫣 Candid & Lainnya</div>`;
            const candids = [
                {v: "Candid Asli (Unaware)", l: "Candid Asli", s: "Tidak sadar kamera"},
                {v: "Candid Pura-Pura (Aesthetic)", l: "Candid Pura-Pura", s: "Sadar kamera tapi buang muka"},
                {v: "Over the Shoulder (OTS)", l: "Over the Shoulder", s: "Dari belakang bahu seseorang"},
                {v: "Accidental Blur / Shaky Shot", l: "Accidental Blur", s: "Tidak sengaja terjepret"}
            ];
            candids.forEach(a => { html += createRadioOption('camRadio', a.v, a.l, val, a.s); });

            html += `<div class="text-xs font-bold text-orange-400 mt-3 mb-1 px-2 border-b border-slate-700 pb-1">📹 Sudut Ekstrem</div>`;
            const extremes = [
                {v: "Kamera Keamanan CCTV", l: "Kamera CCTV", s: "Sudut tinggi pojok ruangan"},
                {v: "Lensa Fisheye Action Cam", l: "Action Cam Fisheye", s: "Lensa sangat cembung"}
            ];
            extremes.forEach(a => { html += createRadioOption('camRadio', a.v, a.l, val, a.s); });

            container.innerHTML = html;
        }

        // --- RESTORED ADVANCED CHARACTER LOGIC ---

        function getCharactersPrompt() {

                const g = document.getElementById('genderSelect').value;
                const a = document.getElementById('ageSelect').value;
                const b = document.getElementById('bodyTypeSelect').value;

                let desc = `Jumlah: ${n}, Gender dominan: ${g}, Rentang Usia: ${a}, Tipe Badan: ${b}.`;
                if(name) desc += ` Karakter utama bernuansa wajah mirip ${name}.`;
                return desc;
            }

            const container = document.getElementById('characterRows');
            let descList = [];
            for (let i=0; i<container.children.length; i++) {

                let gen = document.getElementById(`adv_gender_${i}`).value;
                let age = document.getElementById(`adv_age_${i}`).value;
